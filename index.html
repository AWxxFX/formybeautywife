<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Untuk Sayangku v4.6</title>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body onclick="handleClick(event)">

    <audio id="bgMusic" loop>
        <source src="musik/LetDownRadiohead.mp3" type="audio/mpeg">
    </audio>

    <div id="welcome-overlay">
        <div class="welcome-box">
            <div class="icon">💌</div>
            <h1>Pesan Spesial</h1>
            <p>Siap baca pesan dari aku?</p>
            <button onclick="startExperience(event)">SIAP!</button>
        </div>
    </div>

    <div id="particles"></div>
    <div id="bubbleContainer" class="bubble-container"></div>

    <div class="game-container" id="gameScreen">
        <div id="btn-back" class="btn-back hidden" onclick="prevDialog(event)">
            &lt; KEMBALI
        </div>

        <div class="container hidden" id="content">
            <div id="main-icon-container">
                <div class="icon" id="main-icon">👩‍❤️‍👨</div>
            </div>
            <h1 id="main-text">UNTUK ISTRIKU TERCINTA</h1>
            <p id="sub-text">Klik di mana saja untuk membaca pesan...</p>
            
            <div id="final-hint" class="final-hint-inside hidden game-blink">KLIK MIMOM DI BAWAH UNTUK KEJUTAN FOTO KITA!</div>

            <div class="tap-box" id="tapBox">
                <span id="hint" class="game-blink">TAP UNTUK LANJUT</span>
            </div>
        </div>

        <div class="photo-gallery" id="photoGallery">
            <div class="pixel-frame wood-theme" style="--rot: -5deg;" data-desc="Momen kecil yang bikin hari-hari lebih berwarna. Pertama kali foto kita jadi lockscreen, kerasa beda aja senyumnya">
                <img src="./gallery/foto1.jpg" onerror="this.src='https://via.placeholder.com/150/8d6e63/ffffff?text=FOTO+1'">
            </div>
            <div class="pixel-frame wood-theme" style="--rot: 4deg;" data-desc="Momen pertama kalinya kami bisa 'melihat' Ryuka dengan begitu jelas. Terima kasih sudah mengizinkan kami mengintip ke dalam duniamu yang kecil tapi penuh keajaiban ini. Kenangan terindah!">
                <img src="./gallery/foto2.jpg" onerror="this.src='https://via.placeholder.com/150/8d6e63/ffffff?text=FOTO+2'">
            </div>
            <div class="pixel-frame wood-theme" style="--rot: -2deg;" data-desc="Tentang Bab Baru:   Sebuah lembaran baru telah dibuka. Di tanggal 9 September 2025 ini, kita mulai menulis kisah petualangan terhebat kita: membangun rumah tangga. Aku tidak sabar untuk mengisi setiap halamannya dengan tawa, cinta, dan pertumbuhan bersama">
                <img src="./gallery/foto3.jpg" onerror="this.src='https://via.placeholder.com/150/8d6e63/ffffff?text=FOTO+3'">
            </div>
        </div>

        <img src="./img/karakter_diam.png" class="character hidden" id="mainCharacter" onerror="this.style.display='none'">

        <div id="pixelModal" class="modal-overlay">
            <div class="modal-content">
                <span class="close-btn" onclick="closeModal()">TUTUP [X]</span>
                <img id="modalImg" src="" class="modal-img">
                <div id="modalDesc" class="modal-desc"></div>
            </div>
        </div>
    </div>

    <div id="pixel-transition" class="pixel-transition hidden">
        <div class="pixel-tile"></div><div class="pixel-tile"></div><div class="pixel-tile"></div><div class="pixel-tile"></div><div class="pixel-tile"></div>
        <div class="pixel-tile"></div><div class="pixel-tile"></div><div class="pixel-tile"></div><div class="pixel-tile"></div><div class="pixel-tile"></div>
        <div class="pixel-tile"></div><div class="pixel-tile"></div><div class="pixel-tile"></div><div class="pixel-tile"></div><div class="pixel-tile"></div>
        <div class="pixel-tile"></div><div class="pixel-tile"></div><div class="pixel-tile"></div><div class="pixel-tile"></div><div class="pixel-tile"></div>
        <div class="pixel-tile"></div><div class="pixel-tile"></div><div class="pixel-tile"></div><div class="pixel-tile"></div><div class="pixel-tile"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
